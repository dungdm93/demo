name: Demo

on:
  push:
  workflow_dispatch:

env:
  FOO: bar

jobs:
  demox:
    runs-on: self-hosted # ubuntu-latest
    name: demox job on ${{matrix.foo}}
    strategy:
      matrix:
        foo: [foo]
        bar: [bar]
    env:
      FOOBAR: foobar-env
    steps:
      - name: set command
        run: |
          echo "MY_NAME=Octocat" >> $GITHUB_ENV
          sleep 20

      - name: command message
        run: |
          echo "::debug::Set the Octocat variable"
          echo "::notice file=.github/workflows/demo.yml,line=1,col=5,endColumn=7::The notice message"
          echo "::warning file=$PWD/.github/../.github/workflows/demo.yml,line=2,col=5,endColumn=7,title=WARNING TITLE::The warning message"
          echo "::error file=.github/workflows/demo.yml,line=3,col=5,endColumn=7,title=ERROR TITLE::The error message"
          echo "::error file=/etc/bash.bashrc,line=3,col=5,endColumn=7,title=ERROR TITLE::something wrong in /etc/bash.bashrc"

      - name: env
        run: env | sort

